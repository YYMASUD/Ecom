# backend/railway.toml
# Vue frontend is pre-built and included in backend/public/app/
# Railway only needs to install Node.js dependencies and start the server.

[build]
builder = "NIXPACKS"
buildCommand = "npm install --omit=dev"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
