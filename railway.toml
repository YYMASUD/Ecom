# Root railway.toml — monolith deploy: builds Vue frontend + serves from Express backend
# Railway uploads the full repo, builds here, and starts the Express server.

[build]
builder = "NIXPACKS"
buildCommand = "cd frontend && npm install && npm run build && mkdir -p ../backend/public/app && cp -r dist/. ../backend/public/app/ && cd ../backend && npm install --omit=dev"

[deploy]
startCommand = "node backend/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
