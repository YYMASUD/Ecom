<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Mobile-first viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0" />

    <!-- Theme color -->
    <meta name="theme-color" content="#FF6B35" />

    <!-- Google Fonts – Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- SEO / App meta -->
    <title>ShopHub – Shop Online</title>
    <meta name="description" content="ShopHub – Your modern e-commerce marketplace. Browse thousands of products from verified sellers with fast delivery and secure checkout." />
    <meta name="keywords" content="shophub, marketplace, shop, ecommerce, products, online shopping, deals" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ShopHub – Shop Online" />
    <meta property="og:description" content="ShopHub – Your modern e-commerce marketplace." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ShopHub" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
